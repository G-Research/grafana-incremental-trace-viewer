name: Bundle Stats

on:
  workflow_dispatch:
  # pull_request:
  #   branches:
  #     - main
  # push:
  #   branches:
  #     - main

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  compare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: grafana/plugin-actions/bundle-size@3ef49643a84470fd25bafeb96701fa0be3be6746 # main (provided by grafana)
